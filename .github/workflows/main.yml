name: Clang Format

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  format:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Download confirmation key
        run: |
          wget https://apt.llvm.org/llvm-snapshot.gpg.key

      - name: Add confirmation key
        run: |
          sudo apt-key add llvm-snapshot.gpg.key

      - name: Add llvm-19 repository
        run: |
          sudo add-apt-repository 'deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main'

      - name: Update
        run: |
          sudo apt update

      - name: Set up Clang
        run: |
          sudo apt-get install -y clang-format-19

      - name: Get changed files
        id: changed_files
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }} ${{ github.sha }} > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: Run clang-format
        run: |
          clang-format-19 -i --style=file **/*.cpp **/*.h --files=changed_files.txt
          
      - name: Check for formatting changes
        run: |
          git diff --exit-code || (echo "Code is not formatted correctly" && exit 1)
